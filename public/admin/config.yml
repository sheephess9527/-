backend:
  name: github
  repo: sheephess9527/-
  branch: main
  # 登录授权由本站的 Cloudflare Pages Functions 处理（/auth 与 /callback）
  base_url: https://kimi0315.ccwu.cc
  auth_endpoint: auth

# 后台界面语言
locale: zh_Hans

# 上传的图片存放位置（提交进仓库）
media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    description: 在这里写新文章、编辑或删除已有文章。
    folder: content/posts
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}　·　{{date}}"
    sortable_fields:
      - date
      - title
    fields:
      - { label: 标题, name: title, widget: string }
      - {
          label: 日期,
          name: date,
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - { label: 作者, name: author, widget: string, default: 锚点 }
      - { label: 摘要（显示在首页卡片）, name: excerpt, widget: text }
      - {
          label: 标签,
          name: tags,
          widget: list,
          default: [],
          hint: "回车分隔；第一个标签会作为首页卡片上的分类显示",
        }
      - {
          label: 封面图,
          name: cover,
          widget: image,
          required: false,
          hint: "建议横版图片，会显示在首页网格和文章顶部",
        }
      - { label: 正文, name: body, widget: markdown }
