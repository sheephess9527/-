<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>锚点 · 写作后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
    .topbar { background: #1e293b; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: .05em; }
    .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #94a3b8; }
    #logout-btn { background: none; border: 1px solid #475569; color: #94a3b8; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    #logout-btn:hover { border-color: #94a3b8; color: #e2e8f0; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .login-card p { color: #64748b; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .login-card input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: monospace; margin-bottom: 14px; outline: none; }
    .login-card input:focus { border-color: #2563eb; }
    .login-card .hint { font-size: 12px; color: #94a3b8; margin-bottom: 20px; line-height: 1.7; }
    .login-card .hint a { color: #2563eb; }
    .btn { display: inline-block; width: 100%; padding: 11px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    #login-error { color: #dc2626; font-size: 13px; margin-top: 10px; }
    #app { display: none; }
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 48px); }
    .sidebar { background: #fff; border-right: 1px solid #e2e8f0; padding: 20px 0; }
    .sidebar-section { padding: 8px 20px 4px; font-size: 11px; font-weight: 700; letter-spacing: .1em; color: #94a3b8; text-transform: uppercase; }
    .sidebar-btn { display: block; width: 100%; text-align: left; background: none; border: none; padding: 9px 20px; font-size: 14px; color: #475569; cursor: pointer; border-left: 3px solid transparent; }
    .sidebar-btn:hover { background: #f1f5f9; color: #1e293b; }
    .sidebar-btn.active { background: #eff6ff; color: #2563eb; border-left-color: #2563eb; font-weight: 500; }
    .main { padding: 28px 32px; }
    #post-list { max-width: 800px; }
    .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .list-header h2 { font-size: 20px; font-weight: 700; }
    .new-btn { background: #2563eb; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .new-btn:hover { background: #1d4ed8; }
    .post-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .post-item:hover { border-color: #93c5fd; background: #f8fafc; }
    .post-title { font-size: 15px; font-weight: 500; color: #1e293b; }
    .post-meta { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .post-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .edit-btn { background: none; border: 1px solid #e2e8f0; color: #64748b; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .edit-btn:hover { border-color: #2563eb; color: #2563eb; }
    .del-btn { background: none; border: 1px solid #e2e8f0; color: #94a3b8; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .del-btn:hover { border-color: #dc2626; color: #dc2626; }
    #list-loading { color: #94a3b8; font-size: 14px; padding: 20px 0; }
    #editor-view { display: none; max-width: 860px; }
    .editor-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .back-btn { background: none; border: none; color: #64748b; font-size: 14px; cursor: pointer; padding: 6px 0; }
    .back-btn:hover { color: #1e293b; }
    .editor-header h2 { font-size: 20px; font-weight: 700; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .field input[type=text], .field input[type=date], .field textarea {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none; background: #fff;
    }
    .field input:focus, .field textarea:focus { border-color: #2563eb; }
    .field .hint { font-size: 12px; color: #94a3b8; margin-top: 5px; }
    .field textarea { resize: vertical; min-height: 60px; }
    #body-field { min-height: 420px; font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.7; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .editor-footer { display: flex; align-items: center; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
    .save-btn { background: #2563eb; color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .save-btn:hover { background: #1d4ed8; }
    .save-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    #save-status { font-size: 13px; color: #64748b; }
    #save-status.ok { color: #16a34a; }
    #save-status.err { color: #dc2626; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>&#128274; 锚点 · 写作后台</h2>
    <p>用 GitHub 个人访问令牌登录。令牌只存在你的浏览器里，不会发往任何第三方。</p>
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
    <p class="hint">
      没有令牌？去 <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=maodian-blog" target="_blank">GitHub 生成经典令牌</a>，
      勾选 <strong>public_repo</strong>（仓库是公开的，这一个权限就够）。
    </p>
    <button class="btn" id="login-btn">登录</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <h1>锚点 · 写作后台</h1>
    <div class="topbar-right">
      <span id="user-name"></span>
      <button id="logout-btn">退出</button>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-section">内容</div>
      <button class="sidebar-btn active" id="nav-list">所有文章</button>
    </nav>
    <div class="main">
      <div id="post-list">
        <div class="list-header">
          <h2>所有文章</h2>
          <button class="new-btn" id="new-btn">＋ 新建文章</button>
        </div>
        <div id="list-loading">加载中…</div>
        <div id="posts-container"></div>
      </div>
      <div id="editor-view">
        <div class="editor-header">
          <button class="back-btn" id="back-btn">← 返回列表</button>
          <h2 id="editor-title">新建文章</h2>
        </div>
        <div class="two-col">
          <div class="field">
            <label>标题 *</label>
            <input type="text" id="f-title" placeholder="文章标题" />
          </div>
          <div class="field">
            <label>网址标识（slug）*</label>
            <input type="text" id="f-slug" placeholder="feedback-loop" />
            <div class="hint">英文小写、用连字符。发布后不要改。</div>
          </div>
        </div>
        <div class="two-col">
          <div class="field">
            <label>日期</label>
            <input type="date" id="f-date" />
          </div>
          <div class="field">
            <label>作者</label>
            <input type="text" id="f-author" value="锚点" />
          </div>
        </div>
        <div class="field">
          <label>摘要（显示在卡片上）*</label>
          <input type="text" id="f-excerpt" placeholder="一句话概括" />
        </div>
        <div class="two-col">
          <div class="field">
            <label>标签（逗号分隔）</label>
            <input type="text" id="f-tags" placeholder="系统思维, 决策" />
            <div class="hint">第一个标签作为卡片分类；主栏目：系统思维、决策、效率、思考</div>
          </div>
          <div class="field">
            <label>封面图链接（可选）</label>
            <input type="text" id="f-cover" placeholder="https://picsum.photos/seed/42/1200/800" />
          </div>
        </div>
        <div class="field">
          <label>正文（Markdown）*</label>
          <textarea id="body-field" placeholder="在这里写 Markdown…"></textarea>
        </div>
        <div class="editor-footer">
          <button class="save-btn" id="save-btn">保存并发布</button>
          <span id="save-status"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const OWNER = 'sheephess9527';
const REPO  = 'maodianblog';
const BRANCH = 'main';
const API = 'https://api.github.com';

let token = '';
let editingSlug = '';
let editingFileSha = '';
let allPosts = [];

const headers = () => ({
  Authorization: `token ${token}`,
  Accept: 'application/vnd.github+json',
  'Content-Type': 'application/json',
});

function today() {
  return new Date().toISOString().slice(0, 10);
}

// GitHub API returns base64; TextDecoder handles Chinese UTF-8 correctly
function b64ToUtf8(b64) {
  const bytes = Uint8Array.from(atob(b64.replace(/\n/g, '')), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

function buildFrontmatter(f) {
  const tags = f.tags.split(',').map(t => t.trim()).filter(Boolean);
  const tagLines = tags.map(t => `  - ${t}`).join('\n');
  const cover = f.cover ? `\ncover: ${f.cover}` : '';
  return `---\ntitle: ${f.title}\ndate: ${f.date || today()}\nauthor: ${f.author || '锚点'}\nexcerpt: ${f.excerpt}${cover}\ntags:\n${tagLines}\n---\n`;
}

function parseFrontmatter(raw) {
  const m = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/.exec(raw);
  if (!m) return { data: {}, body: raw };
  const data = {};
  const lines = m[1].split(/\r?\n/);
  let i = 0;
  while (i < lines.length) {
    const kv = /^([A-Za-z0-9_]+):\s*(.*)$/.exec(lines[i]);
    if (!kv) { i++; continue; }
    const [, key, rest] = kv;
    if (rest === '') {
      const list = [];
      i++;
      while (i < lines.length && /^\s*-\s+/.test(lines[i])) {
        list.push(lines[i].replace(/^\s*-\s+/, '').trim());
        i++;
      }
      data[key] = list;
      continue;
    }
    data[key] = rest.replace(/^['"]|['"]$/g, '');
    i++;
  }
  return { data, body: m[2].trim() };
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = '验证中…'; err.textContent = '';
  try {
    const res = await fetch(`${API}/user`, { headers: { Authorization: `token ${t}`, Accept: 'application/vnd.github+json' } });
    if (!res.ok) throw new Error('令牌无效或网络错误（' + res.status + '）');
    const user = await res.json();
    token = t;
    localStorage.setItem('gh_token', t);
    document.getElementById('user-name').textContent = user.login;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadPosts();
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '登录';
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('gh_token'); token = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('token-input').value = '';
});

const savedToken = localStorage.getItem('gh_token');
if (savedToken) { document.getElementById('token-input').value = savedToken; doLogin(); }

async function loadPosts() {
  document.getElementById('list-loading').style.display = 'block';
  document.getElementById('posts-container').innerHTML = '';
  try {
    const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/content/posts?ref=${BRANCH}`, { headers: headers() });
    if (!res.ok) throw new Error('读取失败 ' + res.status);
    const files = await res.json();
    const mds = files.filter(f => f.name.endsWith('.md'));
    const details = await Promise.all(mds.map(async f => {
      const r = await fetch(f.url, { headers: headers() });
      const j = await r.json();
      const raw = b64ToUtf8(j.content);
      const { data } = parseFrontmatter(raw);
      return { slug: f.name.replace(/\.md$/, ''), title: data.title || f.name, date: data.date || '', sha: j.sha };
    }));
    details.sort((a, b) => b.date.localeCompare(a.date));
    allPosts = details;
    renderList();
  } catch(e) {
    document.getElementById('list-loading').textContent = '加载失败：' + e.message;
    return;
  }
  document.getElementById('list-loading').style.display = 'none';
}

function renderList() {
  const c = document.getElementById('posts-container');
  c.innerHTML = '';
  if (!allPosts.length) { c.innerHTML = '<p style="color:#94a3b8;font-size:14px">还没有文章。</p>'; return; }
  allPosts.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post-item';
    div.innerHTML = `<div><div class="post-title">${p.title}</div><div class="post-meta">${p.date} · ${p.slug}</div></div><div class="post-actions"><button class="edit-btn">编辑</button><button class="del-btn">删除</button></div>`;
    div.querySelector('.edit-btn').addEventListener('click', () => openEdit(p.slug));
    div.querySelector('.del-btn').addEventListener('click', () => deletePost(p.slug, p.sha));
    c.appendChild(div);
  });
}

document.getElementById('new-btn').addEventListener('click', openNew);
document.getElementById('back-btn').addEventListener('click', showList);
document.getElementById('save-btn').addEventListener('click', savePost);

function showList() {
  document.getElementById('post-list').style.display = 'block';
  document.getElementById('editor-view').style.display = 'none';
  loadPosts();
}

function showEditor() {
  document.getElementById('post-list').style.display = 'none';
  document.getElementById('editor-view').style.display = 'block';
  document.getElementById('save-status').textContent = '';
}

function openNew() {
  editingSlug = ''; editingFileSha = '';
  document.getElementById('editor-title').textContent = '新建文章';
  ['f-title','f-slug','f-excerpt','f-tags','f-cover','body-field'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = today();
  document.getElementById('f-author').value = '锚点';
  document.getElementById('f-slug').readOnly = false;
  showEditor();
}

async function openEdit(slug) {
  editingSlug = slug;
  document.getElementById('editor-title').textContent = '编辑文章';
  document.getElementById('save-status').textContent = '加载中…';
  showEditor();
  const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/content/posts/${slug}.md?ref=${BRANCH}`, { headers: headers() });
  const j = await res.json();
  editingFileSha = j.sha;
  const { data, body } = parseFrontmatter(b64ToUtf8(j.content));
  document.getElementById('f-title').value = data.title || '';
  document.getElementById('f-slug').value = slug;
  document.getElementById('f-slug').readOnly = true;
  document.getElementById('f-date').value = data.date || today();
  document.getElementById('f-author').value = data.author || '锚点';
  document.getElementById('f-excerpt').value = data.excerpt || '';
  document.getElementById('f-tags').value = Array.isArray(data.tags) ? data.tags.join(', ') : (data.tags || '');
  document.getElementById('f-cover').value = data.cover || '';
  document.getElementById('body-field').value = body;
  document.getElementById('save-status').textContent = '';
}

async function savePost() {
  const title   = document.getElementById('f-title').value.trim();
  const slug    = document.getElementById('f-slug').value.trim().toLowerCase().replace(/\s+/g, '-');
  const excerpt = document.getElementById('f-excerpt').value.trim();
  const body    = document.getElementById('body-field').value;
  if (!title || !slug || !excerpt) { setStatus('标题、网址标识、摘要是必填项', 'err'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  setStatus('<span class="spinner"></span>保存中…', '');
  const fm = buildFrontmatter({
    title,
    date:   document.getElementById('f-date').value || today(),
    author: document.getElementById('f-author').value.trim() || '锚点',
    excerpt,
    tags:   document.getElementById('f-tags').value,
    cover:  document.getElementById('f-cover').value.trim(),
  });
  const fileContent = fm + '\n' + body;
  const encoded = btoa(unescape(encodeURIComponent(fileContent)));
  const payload = {
    message: (editingSlug ? `更新文章: ${title}` : `新增文章: ${title}`),
    content: encoded,
    branch: BRANCH,
  };
  if (editingFileSha) payload.sha = editingFileSha;
  try {
    const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/content/posts/${slug}.md`, {
      method: 'PUT', headers: headers(), body: JSON.stringify(payload),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    setStatus('✓ 已保存！网站约 1–2 分钟后更新。', 'ok');
    const j = await res.json();
    editingFileSha = j.content.sha;
    editingSlug = slug;
    document.getElementById('f-slug').readOnly = true;
  } catch(e) {
    setStatus('保存失败：' + e.message, 'err');
  }
  btn.disabled = false;
}

async function deletePost(slug, sha) {
  if (!confirm(`确定删除「${slug}」吗？此操作不可撤销。`)) return;
  try {
    const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/content/posts/${slug}.md`, {
      method: 'DELETE', headers: headers(),
      body: JSON.stringify({ message: `删除文章: ${slug}`, sha, branch: BRANCH }),
    });
    if (!res.ok) throw new Error((await res.json()).message);
    loadPosts();
  } catch(e) { alert('删除失败：' + e.message); }
}

function setStatus(html, cls) {
  const el = document.getElementById('save-status');
  el.innerHTML = html; el.className = cls;
}
</script>
</body>
</html>
