<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="锚点 —— 用系统对抗混乱，用逻辑重塑日常。记录系统思维、决策方法与效率工具。" />
    <meta name="author" content="锚点" />
    <link rel="canonical" href="https://www.maodian.uk" />
    <title>锚点 · Anchor</title>

    <!-- Open Graph / Twitter Card（文章页会用 JS 动态覆盖） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="锚点 · Anchor" />
    <meta property="og:url" content="https://www.maodian.uk" />
    <meta property="og:title" content="锚点 · Anchor" />
    <meta property="og:description" content="用系统对抗混乱，用逻辑重塑日常。" />
    <meta property="og:image" content="https://www.maodian.uk/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="锚点 · Anchor" />
    <meta name="twitter:description" content="用系统对抗混乱，用逻辑重塑日常。" />
    <meta name="twitter:image" content="https://www.maodian.uk/icons/icon-512.png" />

    <!-- PWA / 添加到主屏幕 -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="锚点" />

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="锚点 · Anchor" href="/rss.xml" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              // 思源黑体（Noto Sans SC）为主，系统字体兜底减少 CLS，Inter 兜底拉丁字符
              sans: ['Noto Sans SC', 'Noto Sans SC Fallback', 'Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                800: '#1e40af', 900: '#1e3a8a',
              },
              accent: {
                50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
                400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- 精简字重：移除 Noto Sans SC 500（真实字体文件不存在 500，减少一次网络请求） -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* 字体回退：在 Noto Sans SC 加载前用系统 CJK 字体填充，匹配字形尺寸减少布局偏移（CLS） */
      @font-face {
        font-family: 'Noto Sans SC Fallback';
        src: local('PingFang SC'), local('Microsoft YaHei'), local('Noto Sans CJK SC'), local('WenQuanYi Zen Hei'), local('Arial');
        size-adjust: 100%;
        ascent-override: 103%;
        descent-override: 27%;
        line-gap-override: 0%;
      }

      html { scroll-behavior: smooth; }
      body {
        font-family: 'Noto Sans SC', 'Noto Sans SC Fallback', 'Inter', system-ui, sans-serif;
        font-size: 17px;
      }
      body, header, article, aside, .theme-transition {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }
      ::selection { background-color: #bfdbfe; color: #1e3a8a; }
      article, main { font-size: 18px; }
      @keyframes page-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .page-enter { animation: page-in 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

      /* ── 打印样式 ── */
      @media print {
        header, footer, .no-print { display: none !important; }
        body { font-size: 12pt; color: #000 !important; background: #fff !important; }
        /* 外部链接在括号里打印 URL */
        a[href^="http"]::after { content: ' (' attr(href) ')'; font-size: 9pt; color: #555; }
        a[href^="#"]::after   { content: ''; }
        pre, blockquote { border: 1px solid #ccc; page-break-inside: avoid; }
        h1, h2, h3, h4 { page-break-after: avoid; }
        p, li { orphans: 3; widows: 3; }
        article { max-width: 100% !important; }
        /* 代码块改为浅色 */
        pre { background: #f5f5f5 !important; color: #000 !important; }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0"
        }
      }
    </script>
  </head>
  <body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
